[tool.poetry]
name = "mesh-backend"
version = "0.1.0"
description = "FastAPI backend for mesh network tower placement optimizer"
authors = []
packages = [{include = "app"}]

[tool.poetry.dependencies]
python = ">=3.10,<4.0"
fastapi = ">=0.110.0"
uvicorn = {version = ">=0.27.0", extras = ["standard"]}
httpx = ">=0.27.0"
structlog = ">=24.1.0"
mesh-calculator = {path = "../mesh-engine", develop = true}

[tool.poetry.group.dev.dependencies]
pytest = ">=8.0.0"
anyio = {version = ">=4.0.0", extras = ["trio"]}
pytest-asyncio = ">=0.23.0"

[tool.pytest.ini_options]
asyncio_mode = "auto"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
